services:
  postgres:
    image: postgres:16-alpine
    container_name: pf-postgres
    environment:
      POSTGRES_DB: pf
      POSTGRES_USER: pf_user
      POSTGRES_PASSWORD: pf_pwd
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pf_user -d pf"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # RABBITMQ - Message Broker
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: pf-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: pf_user
      RABBITMQ_DEFAULT_PASS: pf_password
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - pf-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pf-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pf.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pf-network
    depends_on:
      - postgres

  # ===========================================================================
  # MINIO - S3-compatible Object Storage
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: pf-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pf_user
      MINIO_ROOT_PASSWORD: pf_password
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    networks:
      - pf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # SEQ - Centralized Logging (Optional but recommended)
  # ===========================================================================
  seq:
    image: datalust/seq:2024.3
    container_name: pf-seq
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:80"     # Web UI
      - "5342:5341"   # Ingestion
    volumes:
      - seq_data:/data
    restart: unless-stopped
    networks:
      - pf-network
    #healthcheck:
     #test: ["CMD", "curl", "-f", "http://localhost:80/"]
      #interval: 10s
      #timeout: 5s
      #retries: 5
      #start_period: 20s



  api:
    image: ${DOCKER_REGISTRY-}api
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    ports: 
     - "8080:8080"
    networks:
     - pf-network
    depends_on:
     postgres:
      condition: service_healthy
     rabbitmq:
      condition: service_healthy
##
networks:
  pf-network:
    driver: bridge
##
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  minio_data:
    driver: local
  seq_data:
    driver: local
  rabbitmq_data:
    driver: local