services:
  postgres:
    image: postgres:16-alpine
    container_name: pf-postgres
    environment:
      POSTGRES_DB: pf
      POSTGRES_USER: pf_user
      POSTGRES_PASSWORD: pf_pwd
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pf_user -d pf"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pf-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pf.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pf-network
    depends_on:
      - postgres

  api:
    image: ${DOCKER_REGISTRY-}api
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    ports: 
     - "8080:80"
    networks:
     - pf-network

networks:
  pf-network:
    driver: bridge
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local